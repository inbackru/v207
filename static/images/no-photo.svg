<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EFF6FF"/>
      <stop offset="50%" style="stop-color:#F0F9FF"/>
      <stop offset="100%" style="stop-color:#F8FAFC"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0088CC"/>
      <stop offset="100%" style="stop-color:#0066AA"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#0088CC" stroke-width="0.3" opacity="0.15"/>
  </pattern>
  <rect width="800" height="600" fill="url(#grid)"/>

  <!-- outer ring -->
  <circle cx="400" cy="270" r="110" fill="none" stroke="#0088CC" stroke-width="1.5" opacity="0.15"/>
  <circle cx="400" cy="270" r="90" fill="white" opacity="0.7"/>

  <!-- building icon -->
  <!-- main building -->
  <rect x="350" y="220" width="100" height="90" rx="3" fill="none" stroke="url(#iconGrad)" stroke-width="3"/>
  <!-- roof -->
  <polygon points="340,220 400,175 460,220" fill="none" stroke="url(#iconGrad)" stroke-width="3" stroke-linejoin="round"/>
  <!-- door -->
  <rect x="385" y="275" width="30" height="35" rx="2" fill="none" stroke="url(#iconGrad)" stroke-width="2.5"/>
  <!-- windows row 1 -->
  <rect x="360" y="232" width="22" height="18" rx="2" fill="#0088CC" opacity="0.25" stroke="#0088CC" stroke-width="1.5"/>
  <rect x="418" y="232" width="22" height="18" rx="2" fill="#0088CC" opacity="0.25" stroke="#0088CC" stroke-width="1.5"/>
  <!-- windows row 2 -->
  <rect x="360" y="258" width="22" height="14" rx="2" fill="#0088CC" opacity="0.18" stroke="#0088CC" stroke-width="1.5"/>
  <rect x="418" y="258" width="22" height="14" rx="2" fill="#0088CC" opacity="0.18" stroke="#0088CC" stroke-width="1.5"/>
  <!-- chimney -->
  <rect x="418" y="190" width="10" height="28" rx="2" fill="none" stroke="url(#iconGrad)" stroke-width="2"/>

  <!-- camera lens decoration (small) -->
  <circle cx="400" cy="165" r="8" fill="#0088CC" opacity="0.15" stroke="#0088CC" stroke-width="1.5"/>
  <circle cx="400" cy="165" r="4" fill="#0088CC" opacity="0.3"/>

  <!-- text -->
  <text x="400" y="415" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" fill="#94A3B8" letter-spacing="1">НЕТ ФОТО</text>
  <text x="400" y="443" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#CBD5E1" letter-spacing="0.5">Изображение недоступно</text>

  <!-- bottom accent line -->
  <rect x="340" y="460" width="120" height="2" rx="1" fill="#0088CC" opacity="0.2"/>
</svg>
