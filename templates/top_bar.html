{% if active_banner %}
<div id="promoBannerBar" class="hidden lg:block w-full transition-all duration-300" style="background: {{ active_banner.bg_color or '#F0F7FC' }};">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between py-2 gap-3">
            <div class="flex items-center gap-3 min-w-0 flex-1">
                {% if active_banner.image_url %}
                <img src="{{ active_banner.image_url }}" alt="" class="h-7 w-auto flex-shrink-0 rounded">
                {% endif %}
                <div class="min-w-0 flex items-center gap-2">
                    <span class="text-sm font-semibold" style="color: #0088CC;">{{ active_banner.title }}</span>
                    {% if active_banner.subtitle %}
                    <span class="text-xs text-gray-500">{{ active_banner.subtitle }}</span>
                    {% endif %}
                </div>
            </div>
            <div class="flex items-center gap-3 flex-shrink-0">
                <button onclick="if(typeof openApplicationModal==='function'){openApplicationModal();}else if(typeof openQuickRegistrationModal==='function'){openQuickRegistrationModal();}" class="text-xs font-medium px-3 py-1 rounded-full whitespace-nowrap transition-colors cursor-pointer" style="background: #0088CC; color: white;">{{ active_banner.link_text or 'Подобрать' }}</button>
                <button onclick="closePromoBanner({{ active_banner.id }})" class="text-gray-300 hover:text-gray-500 transition-colors p-1" aria-label="Закрыть">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
        </div>
    </div>
</div>
<script>
(function(){
    var bannerId = {{ active_banner.id }};
    var key = 'inback_banner_closed_' + bannerId;
    if (localStorage.getItem(key)) {
        var bar = document.getElementById('promoBannerBar');
        if (bar) bar.style.display = 'none';
    }
})();
function closePromoBanner(id) {
    localStorage.setItem('inback_banner_closed_' + id, '1');
    var bar = document.getElementById('promoBannerBar');
    if (bar) { bar.style.maxHeight = '0'; bar.style.overflow = 'hidden'; bar.style.padding = '0'; setTimeout(function(){ bar.style.display = 'none'; }, 300); }
}
</script>
{% else %}
<div id="topContactBar" class="hidden lg:block bg-gray-50 border-b border-gray-200 py-2">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between text-sm">
            <div class="flex items-center space-x-6 text-gray-600">
                <a href="tel:+78622666216" class="flex items-center space-x-2 hover:text-[#0088CC] transition-colors">
                    <i class="fas fa-phone text-xs"></i>
                    <span>8 (862) 266-62-16</span>
                </a>
                <a href="mailto:info@inback.ru" class="flex items-center space-x-2 hover:text-[#0088CC] transition-colors">
                    <i class="fas fa-envelope text-xs"></i>
                    <span>info@inback.ru</span>
                </a>
                <span class="hidden lg:inline-flex items-center space-x-2 text-gray-500">
                    <i class="fas fa-clock text-xs"></i>
                    <span>Пн-Пт 9:00-18:00</span>
                </span>
            </div>
            <div class="flex items-center space-x-4">
                <button onclick="openApplicationModal()" class="text-[#0088CC] hover:text-[#006699] font-medium transition-colors">
                    Заказать звонок
                </button>
                <span class="text-gray-300">|</span>
                <button onclick="openQuizModal()" class="bg-[#0088CC] hover:bg-[#006699] text-white px-3 py-1 rounded text-xs font-medium transition-colors">
                    Подобрать квартиру
                </button>
            </div>
        </div>
    </div>
</div>
{% endif %}
